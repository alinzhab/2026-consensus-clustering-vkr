<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title or "Система тестирования консенсусной кластеризации" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --page-bg: linear-gradient(180deg, #eef4ff 0%, #f8fafc 48%, #ffffff 100%);
            --card-shadow: 0 18px 45px rgba(15, 23, 42, .08);
            --soft-border: rgba(148, 163, 184, .20);
            --text-soft: #64748b;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
        }
        body {
            background: var(--page-bg);
            color: #0f172a;
            min-height: 100vh;
        }
        .app-shell {
            max-width: 1400px;
        }
        .topbar {
            margin-top: 1.2rem;
            padding: .85rem 1rem;
            border-radius: 22px;
            background: rgba(255, 255, 255, .86);
            border: 1px solid var(--soft-border);
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(12px);
        }
        .nav-pill {
            display: inline-flex;
            align-items: center;
            padding: .55rem .9rem;
            border-radius: 999px;
            text-decoration: none;
            color: #334155;
            font-weight: 600;
            transition: .2s ease;
        }
        .nav-pill:hover {
            background: #eff6ff;
            color: var(--accent);
        }
        .nav-pill.active {
            background: #0f172a;
            color: white;
        }
        .page-hero {
            margin-top: 1.4rem;
            border-radius: 30px;
            padding: 2.4rem;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, .14), transparent 32%),
                radial-gradient(circle at top right, rgba(14, 165, 233, .10), transparent 28%),
                rgba(255, 255, 255, .84);
            border: 1px solid var(--soft-border);
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(12px);
        }
        .page-kicker {
            display: inline-block;
            padding: .42rem .82rem;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: .9rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .card-panel {
            border: 1px solid var(--soft-border);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(12px);
        }
        .section-note {
            color: var(--text-soft);
            font-size: .98rem;
        }
        .stat-card {
            border-radius: 22px;
            padding: 1.2rem 1.3rem;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            border: 1px solid var(--soft-border);
            height: 100%;
        }
        .stat-label {
            color: var(--text-soft);
            font-size: .92rem;
            margin-bottom: .35rem;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
        }
        .list-card {
            border: 1px solid var(--soft-border);
            border-radius: 18px;
            padding: 1rem 1.05rem;
            height: 100%;
            background: #ffffff;
        }
        .tab-caption {
            margin-top: .9rem;
            margin-bottom: 1rem;
            padding: .9rem 1rem;
            border-radius: 16px;
            background: #f8fafc;
            color: #475569;
            font-size: .96rem;
        }
        .form-label {
            font-weight: 700;
            color: #334155;
        }
        .form-control, .form-select {
            border-radius: 14px;
            border-color: rgba(148, 163, 184, .35);
            padding-top: .78rem;
            padding-bottom: .78rem;
        }
        .btn {
            border-radius: 14px;
            font-weight: 700;
            padding-top: .8rem;
            padding-bottom: .8rem;
        }
        .metric-box {
            border-radius: 18px;
            border: 1px solid var(--soft-border);
            background: #ffffff;
            padding: 1rem 1.1rem;
        }
        .metric-value {
            font-size: 1.25rem;
            font-weight: 800;
        }
        .small-mono {
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: .92rem;
        }
        .table thead th {
            color: #475569;
            font-size: .9rem;
            font-weight: 700;
            border-bottom-width: 1px;
        }
        pre {
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
<div class="container-fluid app-shell px-3 px-lg-4 pb-5">
    <div class="topbar d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
        <div>
            <div class="fw-bold fs-4">Система тестирования консенсусной кластеризации</div>
            <div class="text-secondary small">Генерация данных, запуск алгоритмов и анализ результатов вычислительных экспериментов</div>
        </div>
        <nav class="d-flex flex-wrap gap-2">
            <a class="nav-pill {% if active_page == 'home' %}active{% endif %}" href="{{ url_for('index') }}">Главная</a>
            <a class="nav-pill {% if active_page == 'datasets' %}active{% endif %}" href="{{ url_for('datasets_page') }}">Датасеты</a>
            <a class="nav-pill {% if active_page == 'generate' %}active{% endif %}" href="{{ url_for('generate_page') }}">Генерация</a>
            <a class="nav-pill {% if active_page == 'test' %}active{% endif %}" href="{{ url_for('test_page') }}">Тестирование</a>
            <a class="nav-pill {% if active_page == 'results' %}active{% endif %}" href="{{ url_for('results_page') }}">Результаты</a>
        </nav>
    </div>

    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
